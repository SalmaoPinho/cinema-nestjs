<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineWeb - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --frutiger-blue: #0066cc;
            --frutiger-cyan: #1fb9cc;
            --frutiger-lime: #CDDC39;
            --frutiger-bggradient: linear-gradient(135deg, rgba(20, 30, 110, 0.75) 0%, rgba(0, 10, 60, 0.95) 100%);
        }

        body {
            background: var(--frutiger-bggradient), url('https://frutigeraeroarchive.org/images/wallpapers/asadal_stock/asadal_stock_63.jpg') center/cover fixed no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.7);
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 3rem;
            color: var(--frutiger-blue);
            margin-bottom: 8px;
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--frutiger-blue);
        }

        .logo-text span {
            color: var(--frutiger-cyan);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            font-weight: 700;
            color: var(--frutiger-blue);
            margin-bottom: 8px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: white !important;
            color: #333 !important;
            border: 2px solid var(--frutiger-blue);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--frutiger-cyan);
            box-shadow: 0 0 0 4px rgba(38, 198, 218, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--frutiger-blue), var(--frutiger-cyan));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 119, 255, 0.3);
        }

        .test-users {
            margin-top: 24px;
            padding: 15px;
            background: rgba(0, 119, 255, 0.05);
            border-radius: 12px;
            border: 1px dashed var(--frutiger-blue);
            font-size: 0.8rem;
            color: #555;
        }

        .test-users strong {
            color: var(--frutiger-blue);
        }

        .error-msg {
            background: #fff0f0;
            color: #d63031;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ffcfcf;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo-container">
            <div class="logo-icon"><i class="bi bi-camera-reels"></i></div>
            <div class="logo-text">CineWeb <span>123</span></div>
        </div>

        <div class="error-msg" id="errorMsg">E-mail ou senha inválidos.</div>

        <form id="loginForm">
            <div class="form-group">
                <label><i class="bi bi-envelope me-2"></i>E-mail</label>
                <input type="email" id="email" placeholder="admin@admin.com" required>
            </div>
            <div class="form-group">
                <label><i class="bi bi-lock me-2"></i>Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" id="loginBtn">Entrar no Sistema</button>
        </form>

        <div class="test-users">
            <strong>Dica de Teste:</strong><br><br>
            <strong>Admin:</strong> admin@admin.com / admin123<br>
            <strong>Cliente:</strong> cliente@cliente.com / cliente123
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.innerText = 'Autenticando...';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('cinemanager_token', data.access_token);
                    window.location.href = '/';
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'Erro de comunicação com o servidor.';
                errorMsg.style.display = 'block';
            } finally {
                btn.innerText = 'Entrar no Sistema';
            }
        });

        // Se já tem token, pulamos o login
        if (localStorage.getItem('cinemanager_token')) {
            window.location.href = '/';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
